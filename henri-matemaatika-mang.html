<!DOCTYPE html>
<html lang="et">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
<title>Henri Matemaatika</title>

<!-- PWA / iPad home-screen support -->
<link rel="manifest" href="manifest.json">
<meta name="theme-color" content="#FFE45E">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="default">
<meta name="apple-mobile-web-app-title" content="Matemaatika">
<link rel="apple-touch-icon" href="apple-touch-icon.png">
<link rel="icon" type="image/png" sizes="192x192" href="icon-192.png">
<link rel="icon" type="image/png" sizes="512x512" href="icon-512.png">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Fredoka:wght@500;600;700&family=Bowlby+One&display=swap" rel="stylesheet">
<style>
  :root {
    --bg-1: #FFE45E;
    --bg-2: #FF8AC2;
    --bg-3: #6CC4FF;
    --ink: #1A1A2E;
    --card: #FFFFFF;
    --good: #58C879;
    --bad: #FF5C7A;
    --accent: #7B5BFF;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }

  html, body {
    height: 100%;
    overflow: hidden;
    font-family: 'Fredoka', sans-serif;
    color: var(--ink);
    user-select: none;
    -webkit-user-select: none;
    -webkit-touch-callout: none;
    overscroll-behavior: none;
    position: fixed;
    width: 100%;
  }

  body {
    background:
      radial-gradient(circle at 15% 20%, var(--bg-2) 0%, transparent 45%),
      radial-gradient(circle at 85% 80%, var(--bg-3) 0%, transparent 45%),
      radial-gradient(circle at 50% 50%, var(--bg-1) 0%, var(--bg-1) 100%);
    background-attachment: fixed;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    padding: max(20px, env(safe-area-inset-top)) max(20px, env(safe-area-inset-right)) max(20px, env(safe-area-inset-bottom)) max(20px, env(safe-area-inset-left));
    position: relative;
  }

  /* Floating decorative shapes */
  .shape {
    position: fixed;
    pointer-events: none;
    opacity: 0.4;
    animation: float 8s ease-in-out infinite;
  }
  .shape:nth-child(1) { top: 8%; left: 6%; animation-delay: 0s; }
  .shape:nth-child(2) { top: 12%; right: 8%; animation-delay: -2s; }
  .shape:nth-child(3) { bottom: 10%; left: 10%; animation-delay: -4s; }
  .shape:nth-child(4) { bottom: 14%; right: 6%; animation-delay: -6s; }

  @keyframes float {
    0%, 100% { transform: translateY(0) rotate(0deg); }
    50% { transform: translateY(-20px) rotate(15deg); }
  }

  .header {
    text-align: center;
    margin-bottom: 12px;
    z-index: 2;
  }

  .title {
    font-family: 'Bowlby One', sans-serif;
    font-size: clamp(28px, 6vw, 44px);
    color: var(--ink);
    text-shadow: 4px 4px 0 #fff, 8px 8px 0 var(--accent);
    letter-spacing: 1px;
    transform: rotate(-2deg);
  }

  .stats {
    display: flex;
    gap: 12px;
    margin-top: 14px;
    justify-content: center;
    flex-wrap: wrap;
  }

  .stat-pill {
    background: var(--card);
    padding: 8px 18px;
    border-radius: 999px;
    font-weight: 700;
    font-size: 18px;
    box-shadow: 0 4px 0 var(--ink);
    border: 3px solid var(--ink);
    display: flex;
    align-items: center;
    gap: 8px;
  }

  .game-card {
    background: var(--card);
    border: 4px solid var(--ink);
    border-radius: 32px;
    padding: 32px 24px;
    box-shadow: 8px 8px 0 var(--ink);
    width: min(560px, 100%);
    text-align: center;
    z-index: 2;
    position: relative;
  }

  .question {
    font-family: 'Bowlby One', sans-serif;
    font-size: clamp(48px, 12vw, 84px);
    line-height: 1.1;
    margin: 8px 0 24px;
    color: var(--ink);
  }

  .question .op {
    color: var(--accent);
    margin: 0 8px;
  }

  .question .qmark {
    display: inline-block;
    background: var(--bg-1);
    border: 4px solid var(--ink);
    border-radius: 18px;
    padding: 0 16px;
    margin-left: 8px;
    animation: bobble 1.2s ease-in-out infinite;
  }

  @keyframes bobble {
    0%, 100% { transform: translateY(0) rotate(-3deg); }
    50% { transform: translateY(-6px) rotate(3deg); }
  }

  .answers {
    display: grid;
    grid-template-columns: repeat(2, 1fr);
    gap: 14px;
    margin-top: 8px;
  }

  .answer-btn {
    font-family: 'Bowlby One', sans-serif;
    font-size: clamp(32px, 7vw, 48px);
    background: var(--bg-3);
    border: 4px solid var(--ink);
    border-radius: 22px;
    padding: 18px 8px;
    cursor: pointer;
    box-shadow: 0 6px 0 var(--ink);
    transition: transform 0.08s, box-shadow 0.08s, background 0.2s;
    color: var(--ink);
  }

  .answer-btn:nth-child(1) { background: #FF8AC2; }
  .answer-btn:nth-child(2) { background: #6CC4FF; }
  .answer-btn:nth-child(3) { background: #FFD15E; }
  .answer-btn:nth-child(4) { background: #A78BFA; }

  .answer-btn:hover { transform: translateY(-2px); box-shadow: 0 8px 0 var(--ink); }
  .answer-btn:active { transform: translateY(4px); box-shadow: 0 2px 0 var(--ink); }

  .answer-btn.correct {
    background: var(--good) !important;
    animation: pop 0.5s ease;
  }
  .answer-btn.wrong {
    background: var(--bad) !important;
    animation: shake 0.4s;
  }
  .answer-btn:disabled { cursor: default; }

  @keyframes pop {
    0% { transform: scale(1); }
    50% { transform: scale(1.15) rotate(-3deg); }
    100% { transform: scale(1); }
  }
  @keyframes shake {
    0%, 100% { transform: translateX(0); }
    25% { transform: translateX(-8px); }
    75% { transform: translateX(8px); }
  }

  .feedback {
    font-family: 'Bowlby One', sans-serif;
    font-size: 28px;
    margin-top: 18px;
    min-height: 36px;
    transition: all 0.3s;
  }
  .feedback.good { color: var(--good); }
  .feedback.bad { color: var(--bad); }

  /* Streak fire */
  .streak-flame {
    display: inline-block;
    animation: wobble 0.6s ease-in-out infinite;
  }
  @keyframes wobble {
    0%, 100% { transform: rotate(-8deg) scale(1); }
    50% { transform: rotate(8deg) scale(1.15); }
  }

  /* Confetti */
  .confetti {
    position: fixed;
    top: -20px;
    width: 12px;
    height: 12px;
    pointer-events: none;
    z-index: 10;
  }

  /* Difficulty selector */
  .diff-row {
    display: flex;
    gap: 8px;
    justify-content: center;
    margin-top: 12px;
    flex-wrap: wrap;
  }
  .diff-btn {
    font-family: 'Fredoka', sans-serif;
    font-weight: 600;
    font-size: 14px;
    background: var(--card);
    border: 3px solid var(--ink);
    border-radius: 999px;
    padding: 6px 14px;
    cursor: pointer;
    box-shadow: 0 3px 0 var(--ink);
  }
  .diff-btn.active {
    background: var(--accent);
    color: white;
  }
  .diff-btn:active { transform: translateY(2px); box-shadow: 0 1px 0 var(--ink); }

  @media (max-height: 700px) {
    .title { font-size: 28px; }
    .question { font-size: 56px; margin: 4px 0 16px; }
    .game-card { padding: 20px 18px; }
  }
</style>
</head>
<body>
  <!-- Decorative floating shapes -->
  <svg class="shape" width="60" height="60" viewBox="0 0 60 60"><polygon points="30,4 56,52 4,52" fill="#7B5BFF" stroke="#1A1A2E" stroke-width="3"/></svg>
  <svg class="shape" width="56" height="56" viewBox="0 0 56 56"><circle cx="28" cy="28" r="24" fill="#FF8AC2" stroke="#1A1A2E" stroke-width="3"/></svg>
  <svg class="shape" width="64" height="64" viewBox="0 0 64 64"><rect x="6" y="6" width="52" height="52" rx="10" fill="#58C879" stroke="#1A1A2E" stroke-width="3" transform="rotate(15 32 32)"/></svg>
  <svg class="shape" width="60" height="60" viewBox="0 0 60 60"><polygon points="30,2 37,22 58,22 41,35 47,56 30,44 13,56 19,35 2,22 23,22" fill="#FFD15E" stroke="#1A1A2E" stroke-width="3"/></svg>

  <div class="header">
    <h1 class="title">Henri Matemaatika</h1>
    <div class="stats">
      <div class="stat-pill">⭐ <span id="score">0</span></div>
      <div class="stat-pill">🔥 <span id="streak">0</span></div>
      <div class="stat-pill">🏆 <span id="best">0</span></div>
    </div>
  </div>

  <div class="game-card">
    <div class="question" id="question">2 <span class="op">+</span> 3 = <span class="qmark">?</span></div>
    <div class="answers" id="answers"></div>
    <div class="feedback" id="feedback">&nbsp;</div>
    <div class="diff-row">
      <button class="diff-btn active" data-diff="easy">Lihtne (kuni 5)</button>
      <button class="diff-btn" data-diff="medium">Keskmine (kuni 10)</button>
      <button class="diff-btn" data-diff="hard">Raske (kuni 20)</button>
    </div>
  </div>

<script>
  const scoreEl = document.getElementById('score');
  const streakEl = document.getElementById('streak');
  const bestEl = document.getElementById('best');
  const questionEl = document.getElementById('question');
  const answersEl = document.getElementById('answers');
  const feedbackEl = document.getElementById('feedback');
  const diffBtns = document.querySelectorAll('.diff-btn');

  const STORAGE_KEY = 'henri-math-state';
  const saved = (() => {
    try { return JSON.parse(localStorage.getItem(STORAGE_KEY)) || {}; }
    catch { return {}; }
  })();

  let score = saved.score ?? 0;
  let streak = 0;
  let best = saved.best ?? 0;
  let difficulty = saved.difficulty ?? 'easy';
  let currentAnswer = 0;
  let locked = false;

  function saveState() {
    try { localStorage.setItem(STORAGE_KEY, JSON.stringify({ score, best, difficulty })); }
    catch {}
  }

  const goodMsgs = ['Tubli! 🎉', 'Õige! ⭐', 'Vinge! 🚀', 'Suurepärane! 💪', 'Jaa-jaa! 🌟', 'Nii tark! 🧠'];
  const badMsgs = ['Proovi veel! 💛', 'Pea vastu! 🌈', 'Saad järgmise! 🌟'];

  diffBtns.forEach(btn => {
    if (btn.dataset.diff === difficulty) {
      diffBtns.forEach(b => b.classList.remove('active'));
      btn.classList.add('active');
    }
    btn.addEventListener('click', () => {
      diffBtns.forEach(b => b.classList.remove('active'));
      btn.classList.add('active');
      difficulty = btn.dataset.diff;
      streak = 0;
      saveState();
      updateStats();
      newQuestion();
    });
  });

  function range() {
    if (difficulty === 'easy') return 5;
    if (difficulty === 'medium') return 10;
    return 20;
  }

  function rand(max) { return Math.floor(Math.random() * (max + 1)); }

  function newQuestion() {
    locked = false;
    const max = range();
    const isAdd = Math.random() < 0.5;
    let a, b, answer, op;

    if (isAdd) {
      a = rand(max);
      b = rand(max - a); // ensures answer stays in range
      answer = a + b;
      op = '+';
    } else {
      a = rand(max);
      b = rand(a); // ensures non-negative result
      answer = a - b;
      op = '−';
    }

    currentAnswer = answer;
    questionEl.innerHTML = `${a} <span class="op">${op}</span> ${b} = <span class="qmark">?</span>`;

    // Build answer options (4 choices)
    const options = new Set([answer]);
    while (options.size < 4) {
      const offset = rand(4) - 2 + (Math.random() < 0.5 ? -1 : 1);
      const candidate = answer + offset;
      if (candidate >= 0 && candidate <= max * 2) options.add(candidate);
    }
    const shuffled = [...options].sort(() => Math.random() - 0.5);

    answersEl.innerHTML = '';
    shuffled.forEach(opt => {
      const btn = document.createElement('button');
      btn.className = 'answer-btn';
      btn.textContent = opt;
      btn.dataset.value = opt;
      btn.addEventListener('click', () => handleAnswer(btn, opt));
      answersEl.appendChild(btn);
    });

    feedbackEl.textContent = '\u00a0';
    feedbackEl.className = 'feedback';
  }

  function handleAnswer(btn, value) {
    if (locked) return;
    locked = true;

    if (value === currentAnswer) {
      btn.classList.add('correct');
      score++;
      streak++;
      if (streak > best) best = streak;
      const msg = goodMsgs[Math.floor(Math.random() * goodMsgs.length)];
      feedbackEl.textContent = msg;
      feedbackEl.className = 'feedback good';
      if (streak >= 3) confetti();
      updateStats();
      setTimeout(newQuestion, 1100);
    } else {
      btn.classList.add('wrong');
      streak = 0;
      const msg = badMsgs[Math.floor(Math.random() * badMsgs.length)];
      feedbackEl.textContent = `${msg} Õige vastus on ${currentAnswer}`;
      feedbackEl.className = 'feedback bad';
      // highlight the correct one
      [...answersEl.children].forEach(b => {
        if (Number(b.dataset.value) === currentAnswer) b.classList.add('correct');
        b.disabled = true;
      });
      updateStats();
      setTimeout(newQuestion, 1800);
    }
    saveState();
  }

  function updateStats() {
    scoreEl.textContent = score;
    streakEl.textContent = streak;
    bestEl.textContent = best;
  }

  function confetti() {
    const colors = ['#FF8AC2', '#6CC4FF', '#FFD15E', '#7B5BFF', '#58C879'];
    for (let i = 0; i < 30; i++) {
      const piece = document.createElement('div');
      piece.className = 'confetti';
      piece.style.left = Math.random() * 100 + 'vw';
      piece.style.background = colors[Math.floor(Math.random() * colors.length)];
      piece.style.borderRadius = Math.random() < 0.5 ? '50%' : '2px';
      piece.style.transform = `rotate(${Math.random() * 360}deg)`;
      document.body.appendChild(piece);

      const duration = 1500 + Math.random() * 1500;
      piece.animate([
        { transform: `translateY(0) rotate(0deg)`, opacity: 1 },
        { transform: `translateY(110vh) rotate(${Math.random() * 720}deg)`, opacity: 0.8 }
      ], { duration, easing: 'cubic-bezier(0.4, 0.7, 0.6, 1)' });

      setTimeout(() => piece.remove(), duration);
    }
  }

  // Start
  newQuestion();
  updateStats();

  // Service worker for offline support
  if ('serviceWorker' in navigator) {
    window.addEventListener('load', () => {
      navigator.serviceWorker.register('sw.js').catch(() => {});
    });
  }
</script>
</body>
</html>
